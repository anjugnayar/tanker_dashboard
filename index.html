<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fleet Tanker Command Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link class="main-map" rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        #map { height: 520px; border-radius: 12px; z-index: 1; }
        .vessel-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .vessel-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1); }
        @keyframes radar-pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        @keyframes radar-pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        @keyframes radar-pulse-amber { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        @keyframes radar-pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .indicator-sailing { animation: radar-pulse-green 2s infinite; }
        .indicator-discharging { animation: radar-pulse-blue 2s infinite; }
        .indicator-loading { animation: radar-pulse-amber 2s infinite; }
        .indicator-berthed { animation: radar-pulse-red 2s infinite; }
        .vessel-map-label { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(203, 213, 225, 1); border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="border-b border-slate-200 bg-white/90 backdrop-blur-md sticky top-0 z-[1000] px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 shadow-xs">
        <div>
            <h1 class="text-xl font-black tracking-tight text-slate-900 flex items-center gap-2">🚢 Fleet Tanker Command Console</h1>
            <p class="text-xs text-slate-500 mt-0.5">Drop your daily excel spreadsheet to instantly structure operations.</p>
        </div>
        <div class="w-full md:w-auto">
            <label class="flex flex-col items-center justify-center border border-dashed border-slate-300 hover:border-blue-500 bg-slate-50 hover:bg-slate-100 px-5 py-2.5 rounded-xl cursor-pointer transition-all text-xs font-semibold text-slate-600 hover:text-slate-900 group">
                <span class="flex items-center gap-2">📂 <span class="group-hover:text-blue-600 transition-colors">Ingest Production Spreadsheet</span></span>
                <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" onchange="handleExcelUpload(event)" />
            </label>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs"><p class="text-[10px] text-slate-400 font-bold uppercase">In Transit MS</p><h3 id="msTotal" class="text-2xl font-black text-blue-600">0.0 TMT</h3></div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs"><p class="text-[10px] text-slate-400 font-bold uppercase">In Transit HSD</p><h3 id="hsdTotal" class="text-2xl font-black text-amber-600">0.0 TMT</h3></div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs"><p class="text-[10px] text-slate-400 font-bold uppercase">Active Fleet</p><h3 id="fleetCount" class="text-2xl font-black text-emerald-600">0 Vessels</h3></div>
        </section>

        <section class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs">
            <div id="map"></div>
        </section>

        <section id="vesselContainer" class="space-y-6"></section>
    </main>

    <script>
        let currentFleetData = [];
        let map, markerLayerGroup;

        function initDashboardMap() {
            map = L.map('map').setView([18.5, 79.5], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '©OpenStreetMap' }).addTo(map);
            markerLayerGroup = L.layerGroup().addTo(map);
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const matrix = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

                // Locate header row containing 'Tanker' or 'Vessel'
                const headerRowIdx = matrix.findIndex(r => r.some(c => String(c || "").toUpperCase().includes("TANKER") || String(c || "").toUpperCase().includes("VESSEL")));
                
                const vessels = [];
                matrix[headerRowIdx].forEach((c, idx) => {
                    if (c && idx > 0 && !String(c).toLowerCase().includes("status")) {
                        vessels.push({ name: String(c), col: idx, loading: {ms: 0, hsd: 0}, board: {ms: 0, hsd: 0} });
                    }
                });

                let section = "";
                matrix.forEach(row => {
                    const label = String(row[0] || "").toUpperCase();
                    if (label.includes("LOADING DETAILS")) section = "LOADING";
                    if (label.includes("CARGO ON BOARD")) section = "BOARD";

                    if (section) {
                        vessels.forEach(v => {
                            let val = parseFloat(row[v.col]) || 0;
                            if (label.includes("MS")) section === "LOADING" ? v.loading.ms = val : v.board.ms = val;
                            if (label.includes("HSD")) section === "LOADING" ? v.loading.hsd = val : v.board.hsd = val;
                        });
                    }
                });

                currentFleetData = vessels;
                renderDashboard();
            };
            reader.readAsArrayBuffer(file);
        }

        function renderDashboard() {
            const container = document.getElementById('vesselContainer');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${currentFleetData.map(v => `
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                            <h3 class="font-bold text-lg mb-3 border-b border-slate-100 pb-2">${v.name}</h3>
                            <div class="grid grid-cols-2 gap-4 text-xs">
                                <div>
                                    <p class="text-slate-400 font-bold mb-1 uppercase">Loading</p>
                                    <p class="text-blue-600 font-mono">MS: ${v.loading.ms} TMT</p>
                                    <p class="text-amber-600 font-mono">HSD: ${v.loading.hsd} TMT</p>
                                </div>
                                <div>
                                    <p class="text-slate-400 font-bold mb-1 uppercase">On Board</p>
                                    <p class="text-blue-600 font-mono">MS: ${v.board.ms} TMT</p>
                                    <p class="text-amber-600 font-mono">HSD: ${v.board.hsd} TMT</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('fleetCount').innerText = `${currentFleetData.length} Vessels`;
        }

        window.onload = initDashboardMap;
    </script>
</body>
</html>
