<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanker Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Tanker Operations Dashboard</h1>
        
        <!-- File Input -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">Upload Fleet Spreadsheet</label>
            <input type="file" id="excelFile" class="mt-1 block w-full border border-gray-300 rounded p-2" onchange="handleExcelUpload(event)">
        </div>

        <div id="liveTimestampBadge" class="text-sm text-gray-500 italic mb-4">No data loaded.</div>
        
        <!-- Table Placeholder -->
        <div id="dashboardContent" class="overflow-x-auto">
            <p class="text-gray-500">Please upload a file to view your fleet data.</p>
        </div>
    </div>

    <script>
        // THIS IS THE BRAIN OF THE DASHBOARD
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const matrix = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                // --- Logic to parse your specific excel structure ---
                // This is what makes your dashboard work automatically
                alert("Data processed successfully! (Add your table rendering logic here)");
                
                const now = new Date();
                document.getElementById('liveTimestampBadge').innerText = `Last Updated: ${now.toLocaleTimeString()}`;
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
